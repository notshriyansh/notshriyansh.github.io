<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>shriyansh.sh</title>

    <link rel="stylesheet" href="style.css" />

    <link
      rel="icon"
      href="https://avatars.githubusercontent.com/u/137698358?v=4&size=64"
    />
  </head>

  <body>
    <div class="terminal-container">
      <div class="terminal-output" id="output"></div>

      <div class="terminal-input-line">
        <span class="prompt">shriyansh@portfolio:~$</span>
        <input
          type="text"
          id="commandInput"
          autofocus
          autocomplete="off"
        />
      </div>
    </div>

    <script>
      const input = document.getElementById("commandInput");
      const output = document.getElementById("output");

      let history = [];
      let historyIndex = -1;

      const commands = {
        help: () => `
Available commands:
- about
- projects
- blog
- contact
- resume
- open <project>
- clear
        `,

        about: () => `
hi, i'm shriyansh.

software developer + ml enthusiast.

i build:
- full-stack apps
- distributed systems
- ml systems
        `,

        projects: () => `
projects:

1. orchestrate → workflow orchestration platform
2. linkscope → edge-native url shortener
3. cinemind → ai movie discovery
4. devdocs → rag documentation assistant
5. rateguard → distributed rate limiter
6. meridian → ml forecasting engine

try: open orchestrate
        `,

        blog: () => `
blog coming soon...

(i'll add markdown rendering here)
        `,

        contact: () => `
contact:

email → <a href="mailto:shriyansh707@gmail.com">shriyansh707@gmail.com</a>
github → <a href="https://github.com/notshriyansh" target="_blank">github</a>
x → <a href="https://x.com/shriy4nsh" target="_blank">x</a>
        `,

        resume: () => `
resume:
<a href="https://docs.google.com/document/d/1-FNpJYY4fzVYihUSzBwVmcSH60EmF49I/edit" target="_blank">view resume</a>
        `,

        open: (args) => {
          const project = args[0];

          const links = {
            orchestrate: "https://orchestrate-sage.vercel.app/",
            rateguard:
              "https://rateguard-production.up.railway.app/health",
          };

          if (!project) return "usage: open <project>";

          if (links[project]) {
            window.open(links[project], "_blank");
            return `opening ${project}...`;
          }

          return `project not found: ${project}`;
        },

        clear: () => {
          output.innerHTML = "";
          return "";
        },
      };

      function appendOutput(text) {
        if (!text) return;

        const div = document.createElement("div");
        div.className = "line";
        div.innerHTML = text;
        output.appendChild(div);

        window.scrollTo(0, document.body.scrollHeight);
      }

      function handleCommand(inputText) {
        if (!inputText) return;

        appendOutput(
          `<span class="prompt">shriyansh@portfolio:~$</span> ${inputText}`
        );

        const [cmd, ...args] = inputText.toLowerCase().split(" ");

        if (commands[cmd]) {
          const result = commands[cmd](args);
          appendOutput(result);
        } else {
          appendOutput(`command not found: ${cmd}`);
        }
      }

      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          const command = input.value.trim();

          if (!command) return;

          history.push(command);
          historyIndex = history.length;

          handleCommand(command);
          input.value = "";
        }

        if (e.key === "ArrowUp") {
          if (historyIndex > 0) {
            historyIndex--;
            input.value = history[historyIndex];
          }
        }

        if (e.key === "ArrowDown") {
          if (historyIndex < history.length - 1) {
            historyIndex++;
            input.value = history[historyIndex];
          } else {
            input.value = "";
          }
        }
      });

      window.addEventListener("click", () => input.focus());

      appendOutput(`
welcome to shriyansh.sh

type 'help' to explore.
      `);
    </script>
  </body>
</html>
